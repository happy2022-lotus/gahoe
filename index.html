<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 학교문화 책임규약 수립</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase App & Firestore (Compatibility Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .animate-in { animation: fadeIn 0.7s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 파이어베이스 설정 (가회 프로젝트 정보)
        const firebaseConfig = {
            apiKey: "AIzaSyCHu7vWWvqb8iTzh6lVct5m_JJiA6UZ4bo",
            authDomain: "gahoe-3626b.firebaseapp.com",
            projectId: "gahoe-3626b",
            storageBucket: "gahoe-3626b.firebasestorage.app",
            messagingSenderId: "9371523276",
            appId: "1:9371523276:web:d148cf5a5d55d76d750a69",
            measurementId: "G-RPEV7HL7GP"
        };

        // 초기화
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // 데이터 경로를 artifacts/gahoe-2026/responses 로 단순화
        const APP_ID = "gahoe-2026";

        // 아이콘 컴포넌트
        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const ROLES = [
            { id: 'student', name: '학생', icon: 'graduation-cap', color: 'text-blue-500', bg: 'bg-blue-50', placeholder: "예: 친구의 마음을 공감하며 비속어를 사용하지 않겠습니다." },
            { id: 'parent', name: '학부모', icon: 'users', color: 'text-green-500', bg: 'bg-green-50', placeholder: "예: 학교의 교육활동을 신뢰하고 자녀와 깊게 대화하겠습니다." },
            { id: 'school', name: '학교(교직원)', icon: 'heart', color: 'text-purple-500', bg: 'bg-purple-50', placeholder: "예: 학생의 인권을 존중하고 안전한 학습 환경을 조성하겠습니다." },
        ];

        const IntroView = ({ onStart }) => (
            <div className="max-w-4xl mx-auto py-12 px-4 animate-in text-center">
                <div className="inline-flex items-center gap-2 bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full text-sm font-bold mb-6">
                    <Icon name="book-open" className="w-4 h-4" /> 가이드북 기반 안내
                </div>
                <h1 className="text-4xl md:text-5xl font-black text-slate-900 tracking-tight leading-tight mb-6">
                    모두의 학교를 위한<br /> <span className="text-blue-600">학교문화 책임규약</span>
                </h1>
                <p className="text-lg text-slate-500 max-w-2xl mx-auto mb-12">
                    서로를 존중하고 책임지는 행복한 학교를 만들기 위해 우리 모두의 약속이 필요합니다.
                </p>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12 text-left">
                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                        <Icon name="shield-check" className="w-8 h-8 text-blue-600 mb-4" />
                        <h3 className="text-xl font-bold mb-2">책임규약이란?</h3>
                        <p className="text-slate-600 text-sm">학교 구성원이 함께 바람직한 학교문화 조성을 위해 가져야 할 책임을 다짐하는 약속입니다.</p>
                    </div>
                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                        <Icon name="heart" className="w-8 h-8 text-green-600 mb-4" />
                        <h3 className="text-xl font-bold mb-2">도입 이유</h3>
                        <p className="text-slate-600 text-sm">공감대 형성을 통해 학교폭력 없는 안전하고 행복한 학교를 만들기 위해 도입되었습니다.</p>
                    </div>
                </div>
                <button onClick={onStart} className="w-full max-w-sm bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg active:scale-95 mx-auto">
                    약속 작성하러 가기 <Icon name="arrow-right" className="w-5 h-5" />
                </button>
            </div>
        );

        function App() {
            const [view, setView] = useState('intro');
            const [user, setUser] = useState(null);
            const [entries, setEntries] = useState([]);
            const [selectedRole, setSelectedRole] = useState('student');
            const [inputText, setInputText] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [aiResult, setAiResult] = useState('');
            const [errorMessage, setErrorMessage] = useState('');

            // 익명 로그인
            useEffect(() => {
                auth.signInAnonymously().catch(e => {
                    setErrorMessage("로그인에 실패했습니다. 파이어베이스 설정을 확인해주세요.");
                });
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            // 실시간 데이터 수신
            useEffect(() => {
                if (!user) return;
                
                // 경로 최적화: /artifacts/gahoe-2026/responses
                const q = db.collection('artifacts').doc(APP_ID).collection('responses');
                
                const unsubscribe = q.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setEntries(data);
                }, (err) => {
                    console.error(err);
                    setErrorMessage("데이터를 불러오지 못했습니다. 보안 규칙을 확인해주세요.");
                });
                return () => unsubscribe();
            }, [user]);

            // 워드클라우드 데이터 계산
            const cloudData = useMemo(() => {
                const counts = {};
                entries.forEach(entry => {
                    const words = entry.text.split(/[\s,.\n]+/).filter(w => w.length >= 2);
                    words.forEach(word => { counts[word] = (counts[word] || 0) + 1; });
                });
                return Object.keys(counts).map(value => ({ value, count: counts[value] }))
                    .sort((a, b) => b.count - a.count).slice(0, 30);
            }, [entries]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!inputText.trim() || !user) return;
                
                setIsSubmitting(true);
                setErrorMessage('');
                
                try {
                    await db.collection('artifacts').doc(APP_ID).collection('responses').add({
                        role: selectedRole,
                        text: inputText.trim(),
                        userId: user.uid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setInputText('');
                } catch (error) {
                    console.error("저장 에러:", error);
                    setErrorMessage("약속 저장에 실패했습니다. 잠시 후 다시 시도해주세요.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (view === 'intro') return <IntroView onStart={() => setView('main')} />;

            return (
                <div className="min-h-screen p-4 md:p-6 animate-in">
                    <div className="max-w-6xl mx-auto space-y-6">
                        {/* 헤더 */}
                        <div className="bg-blue-600 text-white p-6 rounded-3xl shadow-lg flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setView('intro')} className="hover:bg-white/20 p-2 rounded-xl">
                                    <Icon name="chevron-left" className="w-6 h-6" />
                                </button>
                                <div>
                                    <h2 className="font-black text-xl">가회 학교문화 책임규약</h2>
                                    <p className="text-xs opacity-70">실시간 의견 수렴 중</p>
                                </div>
                            </div>
                            <div className="bg-white/10 px-4 py-2 rounded-2xl flex items-center gap-2">
                                <Icon name="users" className="w-4 h-4" />
                                <span className="text-sm font-bold">{entries.length}명 참여</span>
                            </div>
                        </div>

                        {/* 에러 메시지 */}
                        {errorMessage && (
                            <div className="bg-red-50 border border-red-200 text-red-600 p-4 rounded-2xl text-sm font-medium flex items-center gap-2">
                                <Icon name="alert-circle" className="w-4 h-4" /> {errorMessage}
                            </div>
                        )}

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            {/* 입력 섹션 */}
                            <div className="lg:col-span-4 space-y-6">
                                <section className="bg-white p-7 rounded-[2rem] shadow-sm border border-slate-200">
                                    <h3 className="text-lg font-bold mb-6 text-slate-800">우리의 약속 남기기</h3>
                                    <div className="flex gap-2 mb-6">
                                        {ROLES.map(role => (
                                            <button key={role.id} onClick={() => setSelectedRole(role.id)}
                                                className={`flex-1 py-3 rounded-2xl text-[10px] font-bold transition-all flex flex-col items-center gap-1 border-2 ${
                                                    selectedRole === role.id ? `${role.bg} ${role.color} border-current` : 'bg-slate-50 text-slate-400 border-transparent'
                                                }`}>
                                                <Icon name={role.icon} className="w-5 h-5" /> {role.name}
                                            </button>
                                        ))}
                                    </div>
                                    <form onSubmit={handleSubmit} className="space-y-4">
                                        <textarea value={inputText} onChange={(e) => setInputText(e.target.value)}
                                            placeholder={ROLES.find(r => r.id === selectedRole).placeholder}
                                            className="w-full h-40 p-5 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 outline-none resize-none text-sm"
                                        />
                                        <button type="submit" disabled={isSubmitting || !inputText.trim()}
                                            className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-slate-800 disabled:opacity-50 transition-all shadow-lg">
                                            <Icon name="send" className="w-4 h-4" /> {isSubmitting ? '전송 중...' : '약속 등록하기'}
                                        </button>
                                    </form>
                                </section>

                                <div className="bg-gradient-to-br from-blue-50 to-indigo-50 p-6 rounded-[2rem] border border-blue-100">
                                    <h4 className="text-sm font-bold text-blue-800 mb-2 flex items-center gap-2">
                                        <Icon name="info" className="w-4 h-4" /> 안내사항
                                    </h4>
                                    <p className="text-xs text-blue-600 leading-relaxed italic">
                                        "모든 구성원의 소중한 의견이 모여 2026년 학교문화 책임규약의 토대가 됩니다."
                                    </p>
                                </div>
                            </div>

                            {/* 워드클라우드 섹션 */}
                            <div className="lg:col-span-8">
                                <section className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 h-full min-h-[500px] flex flex-col">
                                    <h3 className="text-xl font-black text-slate-800 mb-8 flex items-center gap-2">
                                        <Icon name="cloud" className="w-6 h-6 text-blue-600" /> 실시간 워드클라우드
                                    </h3>
                                    <div className="flex-1 flex items-center justify-center bg-slate-50/50 rounded-[2rem] p-6 relative overflow-hidden">
                                        {cloudData.length > 0 ? (
                                            <div className="flex flex-wrap justify-center gap-4">
                                                {cloudData.map((tag, idx) => {
                                                    const max = Math.max(...cloudData.map(t => t.count));
                                                    const min = Math.min(...cloudData.map(t => t.count));
                                                    const size = max === min ? 18 : 14 + ((tag.count - min) / (max - min)) * 32;
                                                    return (
                                                        <span key={tag.value} style={{ fontSize: `${size}px` }}
                                                            className="font-bold text-slate-700 hover:scale-110 transition-transform cursor-default select-none">
                                                            {tag.value}
                                                        </span>
                                                    );
                                                })}
                                            </div>
                                        ) : (
                                            <div className="text-center text-slate-300">
                                                <Icon name="loader" className="w-10 h-10 animate-spin mx-auto mb-4" />
                                                <p className="font-bold">약속이 모이기를 기다리고 있습니다.</p>
                                            </div>
                                        )}
                                    </div>
                                    
                                    {/* 통계 */}
                                    <div className="mt-8 grid grid-cols-3 gap-4">
                                        {ROLES.map(role => {
                                            const count = entries.filter(e => e.role === role.id).length;
                                            return (
                                                <div key={role.id} className="text-center p-3 rounded-2xl bg-slate-50">
                                                    <p className={`text-[10px] font-bold ${role.color} mb-1`}>{role.name}</p>
                                                    <p className="text-lg font-black text-slate-800">{count}</p>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </section>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
