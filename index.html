<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가회중학교 학교문화 책임규약</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #F0F4F8; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .tab-active { background: white; color: #4F46E5; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transform: translateY(-2px); }
        .word-item { transition: all 0.3s ease; cursor: default; display: inline-block; }
        .word-item:hover { transform: scale(1.1); filter: brightness(1.2); }
    </style>
</head>
<body class="text-slate-800">

    <!-- INTRO SCREEN -->
    <div id="intro-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-xl w-full bg-white rounded-[3rem] shadow-2xl overflow-hidden animate__animated animate__fadeIn">
            <div class="bg-gradient-to-br from-indigo-600 to-purple-700 p-12 text-center relative">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-white/20 backdrop-blur-md rounded-2xl mb-6 border border-white/30">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <h1 class="text-white text-3xl font-black mb-2">학교문화 책임규약</h1>
                <p class="text-indigo-100 font-medium tracking-widest">GAHOE MIDDLE SCHOOL</p>
            </div>
            <div class="p-10 space-y-8">
                <p class="text-center text-slate-600 text-lg leading-relaxed">
                    성숙한 배움과 존중이 있는 **가회** 교육을 위해<br/>
                    학교 구성원의 책임을 확인하고 다짐합니다.
                </p>
                <div class="space-y-3 text-sm font-semibold">
                    <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <span class="text-emerald-500">✔</span> <span>서로의 권리를 존중하며 책임 있게 행동하기</span>
                    </div>
                    <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <span class="text-indigo-500">✔</span> <span>건전한 학교 문화를 위한 규칙 준수하기</span>
                    </div>
                </div>
                <button onclick="startApp()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold text-xl hover:bg-indigo-600 transition-all shadow-xl">
                    참여 시작하기
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN (Hidden by default) -->
    <div id="main-screen" class="hidden min-h-screen p-4 md:p-8 animate__animated animate__fadeIn">
        <div class="max-w-6xl mx-auto space-y-6">
            <header class="flex justify-between items-center glass p-6 rounded-[2rem]">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-black text-slate-800">가회중 책임규약</h1>
                        <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Gahoe MS Community</p>
                    </div>
                </div>
                <button onclick="location.reload()" class="p-2 text-slate-400 hover:text-indigo-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </button>
            </header>

            <!-- TABS -->
            <div class="grid grid-cols-3 gap-3 glass p-2 rounded-3xl">
                <button onclick="switchTab('student')" id="tab-student" class="tab-active py-4 rounded-2xl font-bold text-sm transition-all">학생의 책임</button>
                <button onclick="switchTab('parent')" id="tab-parent" class="py-4 rounded-2xl font-bold text-sm transition-all text-slate-400">학부모의 책임</button>
                <button onclick="switchTab('school')" id="tab-school" class="py-4 rounded-2xl font-bold text-sm transition-all text-slate-400">교직원의 책임</button>
            </div>

            <!-- INPUT SECTION -->
            <section class="bg-white rounded-[3rem] shadow-xl p-8 border border-white text-center">
                <h2 class="text-2xl font-extrabold mb-6">우리가 실천할 성숙한 약속</h2>
                <form id="pledge-form" class="flex flex-col md:flex-row gap-4 max-w-3xl mx-auto">
                    <input id="pledge-input" type="text" required placeholder="키워드를 입력하세요 (예: 존중, 배려, 책임)" 
                           class="flex-1 px-8 py-5 bg-slate-50 border border-slate-100 rounded-[2rem] focus:outline-none focus:ring-4 focus:ring-indigo-100 focus:bg-white transition-all text-lg shadow-inner">
                    <button type="submit" id="submit-btn" class="px-10 bg-slate-900 text-white rounded-[2rem] hover:bg-indigo-600 transition-all shadow-xl font-bold flex items-center justify-center gap-3 h-[70px]">
                        <span>등록하기</span>
                    </button>
                </form>
            </section>

            <!-- CLOUD & INFO -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-7 bg-white p-10 rounded-[3rem] shadow-xl border border-white min-h-[450px]">
                    <div class="flex justify-between mb-8 border-b pb-4">
                        <h3 class="font-black text-slate-800 flex items-center gap-2">실시간 가회 키워드</h3>
                        <span class="text-[10px] bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full font-black uppercase">Live</span>
                    </div>
                    <div id="word-cloud" class="flex flex-wrap items-center justify-center gap-6 min-h-[300px]">
                        <!-- Words go here -->
                        <p class="text-slate-300 italic">약속을 등록하여 클라우드를 채워주세요!</p>
                    </div>
                </div>

                <div class="lg:col-span-5 bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl space-y-8">
                    <h3 class="text-indigo-400 font-black text-lg border-b border-white/10 pb-4">성숙한 구성원의 책임</h3>
                    <div id="guidelines" class="space-y-6 text-slate-300">
                        <!-- Guidelines go here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyBcH1PUzFhMazQZxat54-cWz2wlvCsEPpk",
            authDomain: "gahoems.firebaseapp.com",
            projectId: "gahoems",
            storageBucket: "gahoems.firebasestorage.app",
            messagingSenderId: "803125707384",
            appId: "1:803125707384:web:6ea240e030deb3573b238d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'gahoe-ms-culture-app';

        let currentTab = 'student';
        let allResponses = [];

        const guidelines = {
            student: ["타인의 권리 존중 및 책임 의식 고취", "자율과 책임이 조화로운 생활", "언어폭력 및 사이버 폭력 근절"],
            parent: ["학교의 교육활동 및 생활지도 신뢰", "가정 내 올바른 인성 교육 실천", "학교 구성원 간 상호 존중 문화 동참"],
            school: ["안전한 학습 환경 및 공정한 교육", "합리적 생활지도 및 분쟁 조정 강화", "소통 중심의 민주적 학교 공동체 운영"]
        };

        // 앱 시작 함수 (글로벌 등록)
        window.startApp = () => {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            renderGuidelines();
        };

        // 탭 전환 함수 (글로벌 등록)
        window.switchTab = (tab) => {
            currentTab = tab;
            ['student', 'parent', 'school'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if(t === tab) {
                    btn.classList.add('tab-active');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.remove('tab-active');
                    btn.classList.add('text-slate-400');
                }
            });
            renderAll();
        };

        // 가이드라인 렌더링
        function renderGuidelines() {
            const container = document.getElementById('guidelines');
            container.innerHTML = guidelines[currentTab].map((g, i) => `
                <div class="flex gap-4 items-center animate__animated animate__fadeInRight" style="animation-delay: ${i*100}ms">
                    <div class="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center font-bold text-xs">${i+1}</div>
                    <p class="font-medium">${g}</p>
                </div>
            `).join('');
        }

        // 워드클라우드 렌더링
        function renderCloud() {
            const container = document.getElementById('word-cloud');
            const filtered = allResponses.filter(r => r.role === currentTab);
            
            const counts = {};
            filtered.forEach(r => {
                const words = r.text.split(/\s+/).filter(w => w.length > 1);
                words.forEach(w => counts[w] = (counts[w] || 0) + 1);
            });

            const entries = Object.entries(counts);
            if(entries.length === 0) {
                container.innerHTML = '<p class="text-slate-300 italic">아직 등록된 키워드가 없습니다.</p>';
                return;
            }

            const colors = { student: 'text-blue-600', parent: 'text-emerald-600', school: 'text-rose-600' };
            container.innerHTML = entries.map(([word, count]) => {
                const size = Math.min(1.2 + count * 0.5, 4);
                const opacity = Math.min(0.5 + count * 0.2, 1);
                return `<span class="word-item font-black ${colors[currentTab]}" style="font-size: ${size}rem; opacity: ${opacity}">${word}</span>`;
            }).join('');
        }

        function renderAll() {
            renderGuidelines();
            renderCloud();
        }

        // 인증 및 실시간 데이터 수신
        signInAnonymously(auth).then(() => {
            const pledgesCol = collection(db, 'artifacts', appId, 'public', 'data', 'pledges');
            onSnapshot(pledgesCol, (snapshot) => {
                allResponses = snapshot.docs.map(doc => doc.data());
                renderAll();
            });
        });

        // 데이터 등록
        document.getElementById('pledge-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('pledge-input');
            const btn = document.getElementById('submit-btn');
            const text = input.value.trim();

            if(!text) return;

            btn.disabled = true;
            btn.innerHTML = '처리 중...';

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'pledges'), {
                    role: currentTab,
                    text: text,
                    timestamp: new Date().toISOString(),
                    uid: auth.currentUser.uid
                });
                input.value = '';
            } catch (err) {
                console.error(err);
                alert("등록에 실패했습니다.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '등록하기';
            }
        });

    </script>
</body>
</html>
