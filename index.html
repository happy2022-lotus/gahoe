<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 학교문화 책임규약 수립</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase App & Firestore (Compatibility Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .animate-in { animation: fadeIn 0.7s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 파이어베이스 설정
        const firebaseConfig = {
            apiKey: "AIzaSyCHu7vWWvqb8iTzh6lVct5m_JJiA6UZ4bo",
            authDomain: "gahoe-3626b.firebaseapp.com",
            projectId: "gahoe-3626b",
            storageBucket: "gahoe-3626b.firebasestorage.app",
            messagingSenderId: "9371523276",
            appId: "1:9371523276:web:d148cf5a5d55d76d750a69",
            measurementId: "G-RPEV7HL7GP"
        };

        // 초기화 (Compat 버전 사용)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "gahoe-school-contract-2026";

        // 아이콘 컴포넌트
        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const ROLES = [
            { id: 'student', name: '학생', icon: 'graduation-cap', color: 'text-blue-500', bg: 'bg-blue-50', placeholder: "예: 친구의 마음을 공감하며 비속어를 사용하지 않겠습니다." },
            { id: 'parent', name: '학부모', icon: 'users', color: 'text-green-500', bg: 'bg-green-50', placeholder: "예: 학교의 교육활동을 신뢰하고 자녀와 깊게 대화하겠습니다." },
            { id: 'school', name: '학교(교직원)', icon: 'heart', color: 'text-purple-500', bg: 'bg-purple-50', placeholder: "예: 학생의 인권을 존중하고 안전한 학습 환경을 조성하겠습니다." },
        ];

        const IntroView = ({ onStart }) => (
            <div className="max-w-4xl mx-auto py-12 px-4 animate-in">
                <div className="text-center space-y-4 mb-12">
                    <div className="inline-flex items-center gap-2 bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full text-sm font-bold mb-2">
                        <Icon name="book-open" className="w-4 h-4" /> 가이드북 기반 안내
                    </div>
                    <h1 className="text-4xl md:text-5xl font-black text-slate-900 tracking-tight leading-tight">
                        모두의 학교를 위한<br /> <span className="text-blue-600">학교문화 책임규약</span>
                    </h1>
                    <p className="text-lg text-slate-500 max-w-2xl mx-auto">
                        서로를 존중하고 책임지는 행복한 학교를 만들기 위해 우리 모두의 약속이 필요합니다.
                    </p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 space-y-4">
                        <div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center">
                            <Icon name="shield-check" className="w-6 h-6 text-blue-600" />
                        </div>
                        <h3 className="text-xl font-bold">책임규약이란?</h3>
                        <p className="text-slate-600 text-sm leading-relaxed">학교 구성원이 함께 바람직한 학교문화 조성을 위해 가져야 할 책임을 다짐하는 약속입니다.</p>
                    </div>
                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 space-y-4">
                        <div className="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center">
                            <Icon name="heart" className="w-6 h-6 text-green-600" />
                        </div>
                        <h3 className="text-xl font-bold">도입 이유</h3>
                        <p className="text-slate-600 text-sm leading-relaxed">공감대 형성을 통해 학교폭력 없는 안전하고 행복한 '모두의 학교'를 만들기 위해 도입되었습니다.</p>
                    </div>
                </div>
                <button onClick={onStart} className="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg active:scale-95">
                    참여하기 <Icon name="arrow-right" className="w-5 h-5" />
                </button>
            </div>
        );

        const SimpleWordCloud = ({ tags }) => (
            <div className="flex flex-wrap justify-center items-center gap-3 p-4">
                {tags.map((tag, idx) => {
                    const maxCount = Math.max(...tags.map(t => t.count));
                    const minCount = Math.min(...tags.map(t => t.count));
                    const size = maxCount === minCount ? 18 : 14 + ((tag.count - minCount) / (maxCount - minCount)) * 30;
                    const colors = ['#2563eb', '#059669', '#7c3aed', '#d97706', '#dc2626'];
                    return (
                        <span key={tag.value} style={{ fontSize: `${size}px`, color: colors[idx % colors.length], fontWeight: size > 22 ? 'bold' : '500' }} className="hover:scale-110 transition-transform cursor-default select-none bg-white/50 px-2 py-1 rounded-lg shadow-sm">
                            {tag.value}
                        </span>
                    );
                })}
            </div>
        );

        function App() {
            const [view, setView] = useState('intro');
            const [user, setUser] = useState(null);
            const [entries, setEntries] = useState([]);
            const [selectedRole, setSelectedRole] = useState('student');
            const [inputText, setInputText] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [aiResult, setAiResult] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);

            useEffect(() => {
                auth.signInAnonymously().catch(e => console.error("로그인 에러:", e));
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('responses');
                const unsubscribe = q.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setEntries(data);
                }, (error) => {
                    console.error("Firestore 에러:", error);
                });
                return () => unsubscribe();
            }, [user]);

            const cloudData = useMemo(() => {
                const counts = {};
                entries.forEach(entry => {
                    const words = entry.text.split(/[\s,.\n]+/).filter(w => w.length >= 2);
                    words.forEach(word => { counts[word] = (counts[word] || 0) + 1; });
                });
                return Object.keys(counts).map(value => ({ value, count: counts[value] }))
                    .sort((a, b) => b.count - a.count).slice(0, 35);
            }, [entries]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!inputText.trim() || !user) return;
                setIsSubmitting(true);
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('responses').add({
                        role: selectedRole,
                        text: inputText.trim(),
                        userId: user.uid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setInputText('');
                } catch (error) { 
                    console.error("전송 에러:", error); 
                } finally { 
                    setIsSubmitting(false); 
                }
            };

            const generateContract = async () => {
                if (entries.length < 3) return;
                setIsGenerating(true);
                const apiKey = ""; // API Key는 환경에 따라 자동 주입됨
                const wordsSummary = cloudData.map(d => d.value).join(', ');
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `키워드: ${wordsSummary}. 학교문화 책임규약 3문장 작성해줘.` }] }],
                            systemInstruction: { parts: [{ text: "당신은 교육 전문가입니다. ~하겠습니다 체로 작성하세요." }] }
                        })
                    });
                    const result = await response.json();
                    setAiResult(result.candidates?.[0]?.content?.parts?.[0]?.text || "오류가 발생했습니다.");
                } catch (error) { 
                    setAiResult("AI 생성 중 오류가 발생했습니다."); 
                } finally { 
                    setIsGenerating(false); 
                }
            };

            if (view === 'intro') return <IntroView onStart={() => setView('main')} />;

            return (
                <div className="min-h-screen p-4 md:p-6 animate-in">
                    <div className="max-w-6xl mx-auto space-y-6">
                        <div className="bg-blue-600 text-white p-5 rounded-3xl shadow-lg flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setView('intro')} className="hover:bg-white/20 p-2 rounded-xl transition-colors">
                                    <Icon name="book-open" className="w-7 h-7" />
                                </button>
                                <div>
                                    <h2 className="font-black text-xl tracking-tight">2026 가회 학교문화 책임규약</h2>
                                    <p className="text-sm opacity-80">우리의 약속이 실시간으로 모이고 있습니다.</p>
                                </div>
                            </div>
                            <div className="hidden sm:flex items-center gap-2 bg-white/10 px-4 py-2 rounded-2xl">
                                <Icon name="users" className="w-4 h-4" />
                                <span className="text-sm font-bold">{entries.length}명 참여</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <div className="lg:col-span-4 space-y-6">
                                <section className="bg-white p-7 rounded-[2rem] shadow-sm border border-slate-200">
                                    <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800">
                                        <Icon name="message-square" className="w-5 h-5 text-blue-600" /> 의견 등록
                                    </h2>
                                    <div className="flex gap-2 mb-6">
                                        {ROLES.map(role => (
                                            <button key={role.id} onClick={() => setSelectedRole(role.id)}
                                                className={`flex-1 py-3 px-1 rounded-2xl text-xs font-bold transition-all flex flex-col items-center gap-2 border-2 ${
                                                    selectedRole === role.id ? `${role.bg} ${role.color} border-current` : 'bg-slate-50 text-slate-400 border-transparent'
                                                }`}>
                                                <Icon name={role.icon} className="w-5 h-5" /> {role.name}
                                            </button>
                                        ))}
                                    </div>
                                    <form onSubmit={handleSubmit} className="space-y-4">
                                        <textarea value={inputText} onChange={(e) => setInputText(e.target.value)}
                                            placeholder={ROLES.find(r => r.id === selectedRole).placeholder}
                                            className="w-full h-44 p-5 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 outline-none resize-none text-sm"
                                        />
                                        <button type="submit" disabled={isSubmitting || !inputText.trim()}
                                            className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-slate-800 disabled:opacity-50 shadow-xl transition-all">
                                            <Icon name="send" className="w-4 h-4" /> {isSubmitting ? '전송 중...' : '약속 등록하기'}
                                        </button>
                                    </form>
                                </section>

                                <section className="bg-gradient-to-br from-indigo-600 to-purple-700 p-7 rounded-[2rem] shadow-xl text-white">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-lg font-bold flex items-center gap-2"> <Icon name="sparkles" className="w-5 h-5" /> AI 초안 </h2>
                                        <button onClick={generateContract} disabled={isGenerating || entries.length < 3} className="p-2 bg-white/20 rounded-full">
                                            <Icon name="refresh-cw" className={`w-4 h-4 ${isGenerating ? 'animate-spin' : ''}`} />
                                        </button>
                                    </div>
                                    <div className="bg-white/10 backdrop-blur-md p-5 rounded-2xl min-h-[150px] border border-white/20 text-sm leading-relaxed">
                                        {aiResult || "의견 3개 이상 모이면 자동 생성이 가능합니다."}
                                    </div>
                                </section>
                            </div>

                            <div className="lg:col-span-8">
                                <section className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 h-full flex flex-col min-h-[600px]">
                                    <h2 className="text-2xl font-black text-slate-800 mb-8">공동체 마음 워드클라우드</h2>
                                    <div className="flex-1 flex items-center justify-center bg-slate-50/70 rounded-[2rem] border-2 border-dashed border-slate-100 px-6">
                                        {cloudData.length > 0 ? <SimpleWordCloud tags={cloudData} /> : <p className="text-slate-300 font-bold">첫 번째 약속을 기다리고 있습니다!</p>}
                                    </div>
                                    <div className="mt-8 grid grid-cols-3 gap-4">
                                        {ROLES.map(role => {
                                            const count = entries.filter(e => e.role === role.id).length;
                                            const percent = entries.length > 0 ? (count / entries.length * 100).toFixed(0) : 0;
                                            return (
                                                <div key={role.id} className="p-4 rounded-3xl bg-slate-50">
                                                    <div className="flex justify-between mb-2">
                                                        <span className={`text-[10px] font-black ${role.color}`}>{role.name}</span>
                                                        <span className="text-[10px] text-slate-400">{count}건</span>
                                                    </div>
                                                    <div className="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                                                        <div className={`h-full ${role.color.replace('text', 'bg')}`} style={{ width: `${percent}%` }} />
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </section>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
