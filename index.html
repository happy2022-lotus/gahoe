<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가회중학교 학교문화 책임규약</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #F8FAFC; }
        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .tab-active { background: white; color: #4F46E5; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transform: translateY(-2px); }
        .word-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: default; display: inline-block; line-height: 1.2; }
        .word-item:hover { transform: scale(1.15) rotate(2deg); filter: brightness(1.1); }
        .admin-mode .word-item { cursor: pointer; border: 1px dashed #ef4444; padding: 2px 4px; border-radius: 8px; }
        .admin-mode .word-item:hover { background-color: #fef2f2; color: #ef4444 !important; }
        .summary-box { background: linear-gradient(135deg, rgba(79, 70, 229, 0.05), rgba(139, 92, 246, 0.05)); border-left: 6px solid #4F46E5; }
        .intro-card { transition: all 0.3s ease; border: 1px solid #E2E8F0; }
        .highlight-word { color: #4F46E5; font-weight: 900; position: relative; padding: 0 2px; }
        .highlight-word::after { content: ''; position: absolute; bottom: 2px; left: 0; width: 100%; height: 6px; background: rgba(79, 70, 229, 0.1); z-index: -1; }
        .locked-input { background-color: #F1F5F9 !important; cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body class="text-slate-800">

    <div id="intro-screen" class="min-h-screen flex items-center justify-center p-4 md:p-10 bg-gradient-to-br from-slate-50 to-indigo-50">
        <div class="max-w-6xl w-full space-y-10 animate__animated animate__fadeIn text-center">
            <h1 class="text-4xl md:text-6xl font-black text-slate-900 tracking-tight">가회중학교<br/><span class="text-indigo-600">학교문화 책임규약</span></h1>
            <button onclick="startApp()" class="px-12 py-6 bg-slate-900 text-white rounded-[2rem] font-bold text-2xl hover:bg-indigo-600 transition-all shadow-2xl">참여 시작하기</button>
        </div>
    </div>

    <div id="main-screen" class="hidden min-h-screen p-4 md:p-8 animate__animated animate__fadeIn">
        <div class="max-w-6xl mx-auto space-y-6">
            <header class="flex justify-between items-center glass p-6 rounded-[2rem] shadow-sm">
                <div class="flex items-center gap-4 cursor-pointer group" onclick="window.activateAdmin()">
                    <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-black text-slate-800">가회중 책임규약</h1>
                        <p id="admin-indicator" class="text-[10px] text-slate-400 font-bold uppercase">Gahoe MS Community</p>
                    </div>
                </div>
                <button onclick="location.reload()" class="p-2 text-slate-400 hover:text-indigo-600"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg></button>
            </header>

            <div class="grid grid-cols-3 gap-3 glass p-2 rounded-3xl">
                <button onclick="switchTab('student')" id="tab-student" class="tab-active py-4 rounded-2xl font-bold text-sm">학생</button>
                <button onclick="switchTab('parent')" id="tab-parent" class="py-4 rounded-2xl font-bold text-sm text-slate-400">학부모</button>
                <button onclick="switchTab('school')" id="tab-school" class="py-4 rounded-2xl font-bold text-sm text-slate-400">교직원</button>
            </div>

            <section class="bg-white rounded-[3rem] shadow-xl p-8 border border-white text-center">
                <div class="flex flex-col items-center mb-6">
                    <h2 id="input-title" class="text-2xl font-extrabold text-slate-800">약속 등록하기</h2>
                    <button id="lock-toggle-btn" onclick="window.toggleSystemLock()" class="hidden mt-3 px-4 py-1 bg-red-50 text-red-600 rounded-full text-xs font-bold border border-red-100">
                        🔓 작성 허용 중
                    </button>
                </div>
                <form id="pledge-form" class="flex flex-col md:flex-row gap-4 max-w-3xl mx-auto">
                    <input id="pledge-input" type="text" required placeholder="키워드를 입력하세요" 
                           class="flex-1 px-8 py-5 bg-slate-50 border border-slate-100 rounded-[2rem] focus:outline-none focus:ring-4 focus:ring-indigo-100 text-lg shadow-inner">
                    <button type="submit" id="submit-btn" class="px-10 bg-slate-900 text-white rounded-[2rem] font-bold h-[70px]">등록하기</button>
                </form>
                <p id="lock-notice" class="hidden mt-4 text-red-500 font-bold animate__animated animate__pulse infinite">⚠️ 현재는 작성할 수 없는 기간입니다.</p>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-7 bg-white p-10 rounded-[3rem] shadow-xl min-h-[550px] flex flex-col" id="cloud-card">
                    <div class="flex justify-between mb-8 border-b pb-4">
                        <h3 class="font-black text-slate-800">실시간 키워드</h3>
                        <span id="role-tag" class="text-[10px] px-3 py-1 rounded-full font-black uppercase">Student</span>
                    </div>
                    <div id="word-cloud" class="flex-1 flex flex-wrap items-center justify-center gap-6 p-4"></div>
                    <div id="ai-insight" class="mt-8 p-8 summary-box rounded-[2rem] hidden">
                        <div id="insight-list" class="space-y-4"></div>
                    </div>
                </div>

                <div class="lg:col-span-5 bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl space-y-8">
                    <h3 id="guideline-title" class="text-indigo-400 font-black text-lg border-b border-white/10 pb-4">약속 가이드라인</h3>
                    <div id="guidelines" class="space-y-6 text-slate-300"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcH1PUzFhMazQZxat54-cWz2wlvCsEPpk",
            authDomain: "gahoems.firebaseapp.com",
            projectId: "gahoems",
            storageBucket: "gahoems.firebasestorage.app",
            messagingSenderId: "803125707384",
            appId: "1:803125707384:web:6ea240e030deb3573b238d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'gahoe-ms-culture-final-v2';

        let currentTab = 'student';
        let allResponses = [];
        let isAdmin = false;
        let isSystemLocked = false;

        // --- 핵심: 데이터 로드 ---
        signInAnonymously(auth).then(() => {
            // 1. 기존 데이터(pledges) 실시간 감시 (가장 중요)
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'pledges'), (snap) => {
                allResponses = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAll();
            });

            // 2. 잠금 설정 감시 (따로 분리)
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'settings', 'status'), (docSnap) => {
                if(docSnap.exists()){
                    isSystemLocked = docSnap.data().locked;
                    updateLockUI();
                }
            });
        });

        // --- 관리자/잠금 로직 ---
        window.activateAdmin = () => {
            const pw = prompt("관리자 암호를 입력하세요.");
            if(pw === "gahoe1234") {
                isAdmin = !isAdmin;
                document.getElementById('cloud-card').classList.toggle('admin-mode', isAdmin);
                document.getElementById('lock-toggle-btn').classList.toggle('hidden', !isAdmin);
                document.getElementById('admin-indicator').innerText = isAdmin ? "ADMIN MODE ACTIVE" : "Gahoe MS Community";
                document.getElementById('admin-indicator').style.color = isAdmin ? "#ef4444" : "#94a3b8";
                renderAll();
            }
        };

        window.toggleSystemLock = async () => {
            if(!isAdmin) return;
            const newState = !isSystemLocked;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'settings', 'status'), { locked: newState });
        };

        function updateLockUI() {
            const input = document.getElementById('pledge-input');
            const submitBtn = document.getElementById('submit-btn');
            const notice = document.getElementById('lock-notice');
            const toggleBtn = document.getElementById('lock-toggle-btn');

            if(isSystemLocked) {
                input.disabled = true; submitBtn.disabled = true;
                input.classList.add('locked-input');
                input.placeholder = "현재 작성이 제한되었습니다.";
                notice.classList.remove('hidden');
                toggleBtn.innerText = "🔒 작성 금지 중 (클릭 시 해제)";
            } else {
                input.disabled = false; submitBtn.disabled = false;
                input.classList.remove('locked-input');
                input.placeholder = "키워드를 입력하세요";
                notice.classList.add('hidden');
                toggleBtn.innerText = "🔓 작성 허용 중 (클릭 시 잠금)";
            }
        }

        window.handleDelete = async (id, text) => {
            if(!isAdmin) return;
            if(confirm(`"${text}" 항목을 삭제하시겠습니까?`)) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pledges', id));
            }
        };

        // --- UI 렌더링 (기존 로직) ---
        const sentenceEngine = {
            student: ["우리 학생들은 {w1}의 자세로 {w2} 학교를 만듭니다.", "{w1}을(를) 실천하여 {w2}의 가치를 가꾸겠습니다.", "우리는 {w1}와(과) {w2}의 태도로 서로를 존중하겠습니다."],
            parent: ["학부모로서 {w1} 교육에 힘쓰며 {w2} 활동을 지지하겠습니다.", "자녀가 {w1}을(를) 배우고 {w2}하도록 돕겠습니다."],
            school: ["교직원은 {w1}의 환경을 조성하여 {w2} 교육을 실천하겠습니다.", "학생들의 {w1}를 존중하고 {w2}의 원칙을 지키겠습니다."]
        };

        const infoSet = {
            student: { tag: "Student", color: "text-blue-600", rules: ["타인의 권리 존중", "자율과 책임 조화", "폭력 없는 학교", "학습권 보호"] },
            parent: { tag: "Parent", color: "text-emerald-600", rules: ["교육활동 신뢰", "인성 교육 실천", "상호 존중 문화"] },
            school: { tag: "Teacher", color: "text-rose-600", rules: ["안전한 학습 환경", "합리적 생활지도", "민주적 공동체"] }
        };

        window.startApp = () => {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            renderAll();
        };

        window.switchTab = (tab) => {
            currentTab = tab;
            ['student', 'parent', 'school'].forEach(t => {
                document.getElementById(`tab-${t}`).className = (t === tab) ? 'tab-active py-4 rounded-2xl font-bold text-sm' : 'py-4 rounded-2xl font-bold text-sm text-slate-400';
            });
            renderAll();
        };

        function renderAll() {
            const data = infoSet[currentTab];
            document.getElementById('role-tag').innerText = data.tag;
            document.getElementById('role-tag').className = `text-[10px] bg-slate-100 ${data.color} px-3 py-1 rounded-full font-black uppercase`;
            document.getElementById('guideline-title').innerText = "성숙한 " + (currentTab === 'student' ? '학생' : currentTab === 'parent' ? '학부모' : '교직원') + "의 책임";
            document.getElementById('guidelines').innerHTML = data.rules.map((g, i) => `<p>● ${g}</p>`).join('');

            const filtered = allResponses.filter(r => r.role === currentTab);
            const container = document.getElementById('word-cloud');
            const counts = {};
            
            const cloudHtml = filtered.map(item => {
                return item.text.split(/[\s,]+/).filter(w => w.length > 0).map(word => {
                    counts[word] = (counts[word] || 0) + 1;
                    const size = Math.min(1.2 + (counts[word] * 0.2), 3);
                    return `<span onclick="window.handleDelete('${item.id}', '${item.text}')" class="word-item font-black ${data.color}" style="font-size: ${size}rem;">${word}</span>`;
                }).join('');
            }).join('');

            container.innerHTML = cloudHtml || '<p class="text-slate-300 italic">데이터 로딩 중...</p>';
            
            if(filtered.length > 0) {
                const words = Object.keys(counts);
                if(words.length >= 2) {
                    let shuffled = [...words].sort(() => Math.random() - 0.5);
                    while(shuffled.length < 10) shuffled = shuffled.concat(shuffled);
                    let h = "";
                    for(let i=0; i<3; i++) {
                        h += `<p class="text-slate-600 text-sm">● ${sentenceEngine[currentTab][i].replace('{w1}', shuffled[i*2]).replace('{w2}', shuffled[i*2+1])}</p>`;
                    }
                    document.getElementById('insight-list').innerHTML = h;
                    document.getElementById('ai-insight').classList.remove('hidden');
                }
            }
        }

        document.getElementById('pledge-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(isSystemLocked) return;
            const input = document.getElementById('pledge-input');
            const text = input.value.trim();
            if(!text) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'pledges'), {
                role: currentTab, text: text, timestamp: new Date().toISOString()
            });
            input.value = '';
        });
    </script>
</body>
</html>
