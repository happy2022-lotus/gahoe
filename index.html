<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가회중학교 학교문화 책임규약</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #F8FAFC; }
        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .tab-active { background: white; color: #4F46E5; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transform: translateY(-2px); }
        .word-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: default; display: inline-block; }
        .word-item:hover { transform: scale(1.15) rotate(2deg); filter: brightness(1.1); }
        /* 관리자 모드 스타일 */
        .admin-mode .word-item { cursor: pointer; border: 1px dashed #ef4444; padding: 2px 4px; border-radius: 8px; position: relative; }
        .admin-mode .word-item:hover::after { content: '🗑️'; position: absolute; top: -15px; right: -10px; font-size: 12px; }
        .summary-box { background: linear-gradient(135deg, rgba(79, 70, 229, 0.05), rgba(139, 92, 246, 0.05)); border-left: 6px solid #4F46E5; }
        .highlight-word { color: #4F46E5; font-weight: 900; position: relative; padding: 0 2px; }
        .highlight-word::after { content: ''; position: absolute; bottom: 2px; left: 0; width: 100%; height: 6px; background: rgba(79, 70, 229, 0.1); z-index: -1; }
    </style>
</head>
<body class="text-slate-800">

    <div id="intro-screen" class="min-h-screen flex items-center justify-center p-4 md:p-10 bg-gradient-to-br from-slate-50 to-indigo-50">
        <div class="max-w-6xl w-full text-center space-y-10 animate__animated animate__fadeIn">
            <h1 class="text-4xl md:text-6xl font-black text-slate-900 tracking-tight">모두의 학교를 위한<br/><span class="text-indigo-600">학교문화 책임규약</span></h1>
            <button onclick="startApp()" class="px-12 py-6 bg-slate-900 text-white rounded-[2rem] font-bold text-2xl hover:bg-indigo-600 transition-all shadow-2xl">참여 시작하기</button>
        </div>
    </div>

    <div id="main-screen" class="hidden min-h-screen p-4 md:p-8">
        <div class="max-w-6xl mx-auto space-y-6">
            <header class="flex justify-between items-center glass p-6 rounded-[2rem] shadow-sm">
                <div class="flex items-center gap-4 cursor-pointer" onclick="window.activateAdmin()">
                    <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-black text-slate-800">가회중 책임규약</h1>
                        <p id="admin-indicator" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Gahoe MS Community</p>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-3 gap-3 glass p-2 rounded-3xl">
                <button onclick="switchTab('student')" id="tab-student" class="tab-active py-4 rounded-2xl font-bold text-sm">학생</button>
                <button onclick="switchTab('parent')" id="tab-parent" class="py-4 rounded-2xl font-bold text-sm text-slate-400">학부모</button>
                <button onclick="switchTab('school')" id="tab-school" class="py-4 rounded-2xl font-bold text-sm text-slate-400">교직원</button>
            </div>

            <section id="input-section" class="bg-white rounded-[3rem] shadow-xl p-8 border border-white text-center">
                <div class="flex flex-col items-center mb-6">
                    <h2 id="input-title" class="text-2xl font-extrabold text-slate-800">실천할 성숙한 약속</h2>
                    <button id="admin-lock-btn" onclick="window.toggleLock()" class="hidden mt-2 px-4 py-1 bg-red-100 text-red-600 rounded-full text-xs font-bold border border-red-200">
                        🔓 작성 허용 중
                    </button>
                </div>
                <form id="pledge-form" class="flex flex-col md:flex-row gap-4 max-w-3xl mx-auto">
                    <input id="pledge-input" type="text" required placeholder="키워드를 입력하세요" 
                           class="flex-1 px-8 py-5 bg-slate-50 border border-slate-100 rounded-[2rem] focus:outline-none focus:ring-4 focus:ring-indigo-100 text-lg shadow-inner disabled:opacity-50 disabled:cursor-not-allowed">
                    <button type="submit" id="submit-btn" class="px-10 bg-slate-900 text-white rounded-[2rem] font-bold h-[70px] disabled:bg-slate-300">
                        등록하기
                    </button>
                </form>
                <p id="lock-msg" class="hidden mt-4 text-red-500 font-bold animate__animated animate__shakeX">⚠️ 현재는 작성할 수 없는 기간입니다.</p>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div id="cloud-card" class="lg:col-span-7 bg-white p-10 rounded-[3rem] shadow-xl min-h-[500px] flex flex-col">
                    <div class="flex justify-between mb-8 border-b pb-4">
                        <h3 class="font-black text-slate-800">실시간 키워드</h3>
                        <span id="role-tag" class="text-[10px] px-3 py-1 rounded-full font-black uppercase">Student</span>
                    </div>
                    <div id="word-cloud" class="flex-1 flex flex-wrap items-center justify-center gap-6"></div>
                    <div id="ai-insight" class="mt-8 p-8 summary-box rounded-[2rem] hidden">
                        <div id="insight-list" class="space-y-4"></div>
                    </div>
                </div>
                <div class="lg:col-span-5 bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl space-y-8">
                    <h3 id="guideline-title" class="text-indigo-400 font-black text-lg border-b border-white/10 pb-4">약속 가이드라인</h3>
                    <div id="guidelines" class="space-y-6"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcH1PUzFhMazQZxat54-cWz2wlvCsEPpk",
            authDomain: "gahoems.firebaseapp.com",
            projectId: "gahoems",
            storageBucket: "gahoems.firebasestorage.app",
            messagingSenderId: "803125707384",
            appId: "1:803125707384:web:6ea240e030deb3573b238d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'gahoe-ms-culture-final-v2';

        let currentTab = 'student';
        let allResponses = [];
        let isAdmin = false;
        let isLocked = false;

        // --- 관리자: 잠금 토글 함수 ---
        window.toggleLock = async () => {
            if(!isAdmin) return;
            const newLockStatus = !isLocked;
            try {
                // 'settings'라는 별도의 문서에 잠금 상태 저장
                await setDoc(doc(db, 'artifacts', appId, 'public', 'settings', 'config'), {
                    isLocked: newLockStatus
                }, { merge: true });
            } catch (e) { alert("상태 변경 실패"); }
        };

        // --- 관리자: 모드 활성화 ---
        window.activateAdmin = () => {
            const pw = prompt("관리자 암호를 입력하세요.");
            if(pw === "gahoe1234") {
                isAdmin = !isAdmin;
                document.getElementById('cloud-card').classList.toggle('admin-mode', isAdmin);
                document.getElementById('admin-lock-btn').classList.toggle('hidden', !isAdmin);
                document.getElementById('admin-indicator').innerText = isAdmin ? "ADMIN MODE ACTIVE (Click Word to Delete)" : "Gahoe MS Community";
                document.getElementById('admin-indicator').style.color = isAdmin ? "#ef4444" : "#94a3b8";
                alert(isAdmin ? "관리자 모드 활성화" : "관리자 모드 해제");
                renderAll();
            }
        };

        // --- 삭제 함수 ---
        window.handleDelete = async (id, text) => {
            if(!isAdmin) return;
            if(confirm(`"${text}" 항목을 삭제하시겠습니까?`)) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pledges', id));
            }
        };

        // --- 화면 초기화 및 리스너 ---
        signInAnonymously(auth).then(() => {
            // 1. 잠금 상태 실시간 감시
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'settings', 'config'), (doc) => {
                if(doc.exists()) {
                    isLocked = doc.data().isLocked;
                    updateLockUI();
                }
            });

            // 2. 데이터 실시간 감시
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'pledges'), (snap) => {
                allResponses = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAll();
            });
        });

        function updateLockUI() {
            const input = document.getElementById('pledge-input');
            const btn = document.getElementById('submit-btn');
            const lockMsg = document.getElementById('lock-msg');
            const adminLockBtn = document.getElementById('admin-lock-btn');

            if(isLocked) {
                input.disabled = true;
                btn.disabled = true;
                input.placeholder = "현재는 작성이 금지되어 있습니다.";
                lockMsg.classList.remove('hidden');
                adminLockBtn.innerText = "🔒 작성 금지 중";
                adminLockBtn.classList.replace('bg-red-100', 'bg-slate-800');
                adminLockBtn.classList.replace('text-red-600', 'text-white');
            } else {
                input.disabled = false;
                btn.disabled = false;
                input.placeholder = "키워드를 입력하세요";
                lockMsg.classList.add('hidden');
                adminLockBtn.innerText = "🔓 작성 허용 중";
                adminLockBtn.classList.replace('bg-slate-800', 'bg-red-100');
                adminLockBtn.classList.replace('text-white', 'text-red-600');
            }
        }

        // --- 기타 렌더링 함수들 (동일 구조) ---
        window.startApp = () => {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            renderAll();
        };

        window.switchTab = (tab) => {
            currentTab = tab;
            ['student', 'parent', 'school'].forEach(t => {
                document.getElementById(`tab-${t}`).className = (t === tab) ? 'tab-active py-4 rounded-2xl font-bold text-sm' : 'py-4 rounded-2xl font-bold text-sm text-slate-400';
            });
            renderAll();
        };

        const sentenceEngine = {
            student: ["우리 학생들은 {w1}의 자세로 {w2} 학교를 만듭니다.", "{w1}을(를) 실천하여 {w2}의 가치를 가꾸겠습니다.", "우리는 {w1}와(과) {w2}의 태도로 서로를 존중하겠습니다.", "{w1}을(를) 바탕으로 {w2}의 책임을 다하겠습니다.", "{w1}와(과) {w2}가 공존하는 가회중을 약속합니다."],
            parent: ["학부모로서 {w1} 교육에 힘쓰며 {w2} 활동을 지지하겠습니다.", "자녀가 {w1}을(를) 배우고 {w2}하도록 돕겠습니다.", "학교를 신뢰하고 {w1}와(과) {w2}의 마음으로 동참하겠습니다.", "가정에서 {w1}의 모범을 보이며 {w2} 성장을 돕겠습니다.", "우리 아이들이 {w1}하고 {w2}하는 환경에서 자라게 협력하겠습니다."],
            school: ["교직원은 {w1}의 환경을 조성하여 {w2} 교육을 실천하겠습니다.", "학생들의 {w1}를 존중하고 {w2}의 원칙을 지키겠습니다.", "{w1} 기반의 지도로 아이들의 {w2}를 지원하겠습니다.", "안전한 학교에서 {w1}와(과) {w2}의 가치가 피어나게 하겠습니다.", "{w1}하고 {w2}하는 성숙한 공동체를 이끌겠습니다."]
        };

        const infoSet = {
            student: { tag: "Student", color: "text-blue-600", rules: ["타인의 권리 존중", "자율과 책임 조화", "폭력 없는 학교", "학습권 보호"] },
            parent: { tag: "Parent", color: "text-emerald-600", rules: ["교육활동 신뢰", "인성 교육 실천", "상호 존중 문화", "공감과 소통"] },
            school: { tag: "Teacher", color: "text-rose-600", rules: ["안전한 학습 환경", "합리적 생활지도", "민주적 공동체", "인격 존중"] }
        };

        function renderCloud() {
            const container = document.getElementById('word-cloud');
            const roleTag = document.getElementById('role-tag');
            const currentData = infoSet[currentTab];
            roleTag.innerText = currentData.tag;

            const filtered = allResponses.filter(r => r.role === currentTab);
            const counts = {};
            
            const cloudHtml = filtered.map(item => {
                const words = item.text.split(/[\s,]+/).filter(w => w.length > 0);
                return words.map(word => {
                    counts[word] = (counts[word] || 0) + 1;
                    const size = Math.min(1.2 + (counts[word] * 0.3), 3);
                    return `<span onclick="window.handleDelete('${item.id}', '${item.text}')" class="word-item font-black ${currentData.color}" style="font-size: ${size}rem;">${word}</span>`;
                }).join('');
            }).join('');

            container.innerHTML = cloudHtml || '<p class="text-slate-300 italic text-center">등록된 약속이 없습니다.</p>';
            if(filtered.length > 1) generateCombinedInsights(counts);
            else document.getElementById('ai-insight').classList.add('hidden');
        }

        function generateCombinedInsights(counts) {
            const insightBox = document.getElementById('ai-insight');
            const insightList = document.getElementById('insight-list');
            const allWords = Object.keys(counts);
            let shuffled = [...allWords].sort(() => Math.random() - 0.5);
            while(shuffled.length < 10) shuffled = shuffled.concat(shuffled);
            let html = "";
            for (let i = 0; i < 5; i++) {
                const fullSentence = sentenceEngine[currentTab][i].replace(/{w1}/g, `<span class="highlight-word">${shuffled[i*2]}</span>`).replace(/{w2}/g, `<span class="highlight-word">${shuffled[i*2+1]}</span>`);
                html += `<p class="text-slate-600 font-medium text-[15px]">● ${fullSentence}</p>`;
            }
            insightList.innerHTML = html;
            insightBox.classList.remove('hidden');
        }

        function renderAll() {
            const container = document.getElementById('guidelines');
            const data = infoSet[currentTab];
            document.getElementById('input-title').innerText = (currentTab === 'student' ? '학생' : currentTab === 'parent' ? '학부모' : '교직원') + "으로서 실천할 성숙한 약속";
            document.getElementById('guideline-title').innerText = "성숙한 " + (currentTab === 'student' ? '학생' : currentTab === 'parent' ? '학부모' : '교직원') + "의 책임";
            container.innerHTML = data.rules.map((g, i) => `<div class="flex gap-4 items-center"><div class="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center font-bold text-xs">${i+1}</div><p class="font-medium text-slate-100">${g}</p></div>`).join('');
            renderCloud();
        }

        document.getElementById('pledge-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(isLocked) return;
            const input = document.getElementById('pledge-input');
            const text = input.value.trim();
            if(!text) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'pledges'), {
                role: currentTab, text: text, timestamp: new Date().toISOString()
            });
            input.value = '';
        });
    </script>
</body>
</html>
